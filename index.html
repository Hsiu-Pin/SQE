<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>法律專業題目練習系統 (含錯題本功能)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-50">

    <div id="app" class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white relative">
            <div class="flex justify-between items-end mb-4">
                <div>
                    <span id="set-label" class="bg-indigo-500 text-xs py-1 px-2 rounded-md uppercase tracking-wider font-bold">Group 1</span>
                    <h1 class="text-2xl font-bold mt-1">法律專業測驗</h1>
                </div>
                <div id="score-counter" class="text-right">
                    <span class="text-sm opacity-75">正確率</span>
                    <div class="text-xl font-mono font-bold" id="live-accuracy">0%</div>
                </div>
            </div>
            <div class="h-2 bg-indigo-800/50 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-yellow-400 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
            <div class="flex justify-between mt-2 items-center">
                <p id="progress-text" class="text-[10px] opacity-80 uppercase tracking-widest font-medium">準備中...</p>
                <div class="flex space-x-2">
                    <button onclick="toggleWrongBook()" id="wrong-book-btn" class="bg-red-500 hover:bg-red-600 text-white text-[10px] rounded px-2 py-1 transition-colors">
                        進入錯題本 (<span id="wrong-count">0</span>)
                    </button>
                    <select id="group-selector" onchange="jumpToGroup(this.value)" class="bg-indigo-700 text-white text-[10px] border-none rounded px-2 py-1 outline-none cursor-pointer">
                        <!-- 動態產生組別 -->
                    </select>
                </div>
            </div>
        </div>

        <!-- Quiz Area -->
        <div id="quiz-container" class="p-6 md:p-10">
            <div id="question-box" class="fade-in">
                <div class="flex items-center justify-between mb-4">
                    <span id="question-id-tag" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded-full">Question</span>
                    <span id="mode-tag" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">一般練習模式</span>
                </div>
                <h2 id="question-text" class="text-lg md:text-xl font-medium text-gray-800 mb-8 leading-relaxed">載入中...</h2>
                
                <div id="options-container" class="space-y-4"></div>
            </div>

            <!-- Feedback -->
            <div id="feedback-area" class="mt-8 hidden">
                <div id="feedback-message" class="p-4 rounded-2xl mb-4 font-medium flex items-center space-x-3 text-sm"></div>
                <button id="next-btn" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95 flex justify-center items-center space-x-2">
                    <span>下一題</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="p-8 md:p-10 hidden text-center fade-in">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">練習結束</h2>
            <p class="text-gray-500 mb-6" id="result-subtitle">太棒了！您已經完成此階段練習。</p>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-50 p-4 rounded-2xl border border-gray-100">
                    <span class="block text-gray-400 text-sm mb-1">得分</span>
                    <span class="text-2xl font-bold text-indigo-600" id="final-score-text">0/0</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-gray-100">
                    <span class="block text-gray-400 text-sm mb-1">正確率</span>
                    <span class="text-2xl font-bold text-indigo-600" id="final-accuracy-text">0%</span>
                </div>
            </div>

            <!-- Wrong Questions Summary -->
            <div id="wrong-questions-summary" class="text-left mb-8 bg-red-50 p-4 rounded-2xl border border-red-100 hidden">
                <h3 class="text-red-800 font-bold mb-2 flex items-center text-sm">本輪答錯題號</h3>
                <div id="wrong-list" class="flex flex-wrap gap-2 text-sm text-red-600 font-medium"></div>
            </div>

            <div class="space-y-3">
                <button id="next-group-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 hidden">
                    進入下一組
                </button>
                <button onclick="restartCurrentSession(true)" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                    本輪亂序重做
                </button>
                <button onclick="exitToNormal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-4 rounded-2xl transition-all active:scale-95">
                    本輪正序重做
                </button>
            </div>
        </div>
    </div>

    <script src="questions.js"></script>

    <script>
        const QUESTIONS_PER_GROUP = 25;
        const LOCAL_STORAGE_KEY = 'law_quiz_wrong_ids';

        let allQuestions = [];
        let groupedQuestions = [];
        let currentQuizData = []; 
        let currentQuestionIndex = 0;
        let score = 0;
        let answeredTotal = 0;
        let isAnswered = false;
        let isRandomMode = false;
        let isWrongBookMode = false;
        let currentGroupIndex = 0;
        let wrongQuestionsInThisRound = [];

        window.onload = () => {
            if (window.originalQuizData) {
                allQuestions = window.originalQuizData;
                splitIntoGroups();
                renderGroupSelector();
                updateWrongCountDisplay();
                initQuiz(0);
            } else {
                alert("找不到題庫數據。");
            }
        };

        // --- 錯題本核心邏輯 ---

        function getSavedWrongIds() {
            const saved = localStorage.getItem(LOCAL_STORAGE_KEY);
            return saved ? JSON.parse(saved) : [];
        }

        function saveWrongId(id) {
            let ids = getSavedWrongIds();
            if (!ids.includes(id)) {
                ids.push(id);
                localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(ids));
            }
            updateWrongCountDisplay();
        }

        function removeWrongId(id) {
            let ids = getSavedWrongIds();
            ids = ids.filter(item => item !== id);
            localStorage.setItem(LOCAL_STORAGE_KEY, JSON.stringify(ids));
            updateWrongCountDisplay();
        }

        function updateWrongCountDisplay() {
            const count = getSavedWrongIds().length;
            document.getElementById('wrong-count').innerText = count;
        }

        function toggleWrongBook() {
            if (isWrongBookMode) {
                exitToNormal();
            } else {
                const wrongIds = getSavedWrongIds();
                if (wrongIds.length === 0) {
                    alert("目前沒有錯題紀錄喔！繼續加油！");
                    return;
                }
                enterWrongBookMode();
            }
        }

        function enterWrongBookMode() {
            isWrongBookMode = true;
            const wrongIds = getSavedWrongIds();
            // 從總題庫篩選出符合 ID 的題目
            currentQuizData = allQuestions.filter(q => wrongIds.includes(q.id));
            
            document.getElementById('mode-tag').innerText = "錯題複習模式";
            document.getElementById('mode-tag').classList.replace('text-gray-400', 'text-red-500');
            document.getElementById('wrong-book-btn').innerText = "退出錯題本";
            document.getElementById('group-selector').style.display = 'none';
            document.getElementById('set-label').innerText = "Wrong Book";
            
            resetSessionStats();
            loadQuestion();
            updateProgress();
        }

        function exitToNormal() {
            isWrongBookMode = false;
            document.getElementById('mode-tag').innerText = "一般練習模式";
            document.getElementById('mode-tag').classList.replace('text-red-500', 'text-gray-400');
            document.getElementById('wrong-book-btn').innerHTML = `進入錯題本 (<span id="wrong-count">${getSavedWrongIds().length}</span>)`;
            document.getElementById('group-selector').style.display = 'inline-block';
            initQuiz(currentGroupIndex);
        }

        // --- 基礎測驗邏輯 ---

        function splitIntoGroups() {
            groupedQuestions = [];
            for (let i = 0; i < allQuestions.length; i += QUESTIONS_PER_GROUP) {
                groupedQuestions.push(allQuestions.slice(i, i + QUESTIONS_PER_GROUP));
            }
        }

        function renderGroupSelector() {
            const selector = document.getElementById('group-selector');
            selector.innerHTML = '';
            groupedQuestions.forEach((group, index) => {
                const option = document.createElement('option');
                option.value = index;
                const start = index * QUESTIONS_PER_GROUP + 1;
                const end = Math.min((index + 1) * QUESTIONS_PER_GROUP, allQuestions.length);
                option.innerText = `組別 ${index + 1} (${start}-${end})`;
                selector.appendChild(option);
            });
        }

        function jumpToGroup(index) {
            initQuiz(parseInt(index));
        }

        function initQuiz(groupIndex, shouldShuffle = false) {
            currentGroupIndex = groupIndex;
            isRandomMode = shouldShuffle;
            currentQuizData = shouldShuffle ? shuffle([...groupedQuestions[groupIndex]]) : [...groupedQuestions[groupIndex]];
            
            document.getElementById('group-selector').value = groupIndex;
            document.getElementById('set-label').innerText = `Group ${groupIndex + 1}`;
            resetSessionStats();
            loadQuestion();
            updateProgress();
        }

        function restartCurrentSession(shouldShuffle = false) {
            isRandomMode = shouldShuffle;
            currentQuizData = shouldShuffle ? shuffle([...currentQuizData]) : [...currentQuizData];
            resetSessionStats();
            loadQuestion();
            updateProgress();
        }

        function resetSessionStats() {
            currentQuestionIndex = 0;
            score = 0;
            answeredTotal = 0;
            isAnswered = false;
            wrongQuestionsInThisRound = [];
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('next-btn').innerHTML = '<span>下一題</span>';
        }

        function shuffle(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function updateProgress() {
            const progress = (currentQuestionIndex / currentQuizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `進度: ${currentQuestionIndex + 1} / ${currentQuizData.length}`;
            const accuracy = answeredTotal === 0 ? 0 : Math.round((score / answeredTotal) * 100);
            document.getElementById('live-accuracy').innerText = `${accuracy}%`;
        }

        function loadQuestion() {
            isAnswered = false;
            const q = currentQuizData[currentQuestionIndex];
            document.getElementById('question-id-tag').innerText = `題號 #${q.id}`;
            document.getElementById('question-text').innerText = q.question;
            
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback-area').classList.add('hidden');
            
            let optionEntries = Object.entries(q.options);
            if (isRandomMode) optionEntries = shuffle(optionEntries);

            const labelChars = ['A', 'B', 'C', 'D', 'E'];
            optionEntries.forEach((entry, index) => {
                const [key, val] = entry;
                const btn = document.createElement('button');
                btn.className = 'option-card w-full text-left p-4 rounded-2xl border-2 border-gray-100 bg-white hover:border-indigo-200 hover:bg-indigo-50 transition-all flex items-start group';
                btn.innerHTML = `
                    <span class="flex-shrink-0 w-8 h-8 rounded-lg bg-gray-100 group-hover:bg-indigo-600 group-hover:text-white text-gray-500 flex items-center justify-center font-bold text-sm mr-4">${labelChars[index]}</span>
                    <span class="text-gray-700 pt-1 text-sm md:text-base">${val}</span>
                `;
                btn.onclick = () => checkAnswer(key, btn);
                btn.dataset.key = key;
                container.appendChild(btn);
            });
            updateProgress();
        }

        function checkAnswer(selectedKey, clickedBtn) {
            if (isAnswered) return;
            isAnswered = true;
            answeredTotal++;

            const q = currentQuizData[currentQuestionIndex];
            const correctKey = q.answer;
            const buttons = document.querySelectorAll('.option-card');

            buttons.forEach(b => {
                if (b.dataset.key === correctKey) b.classList.add('correct');
                else if (b.dataset.key === selectedKey) b.classList.add('wrong');
                b.style.cursor = 'default';
            });

            const feedbackMsg = document.getElementById('feedback-message');
            document.getElementById('feedback-area').classList.remove('hidden');

            if (selectedKey === correctKey) {
                score++;
                feedbackMsg.className = 'p-4 rounded-2xl mb-4 font-bold bg-green-50 text-green-700 border border-green-200';
                feedbackMsg.innerHTML = "正確解答！";
                // 如果在錯題本模式下答對，則移除該錯題紀錄
                if (isWrongBookMode) removeWrongId(q.id);
            } else {
                wrongQuestionsInThisRound.push(q.id);
                saveWrongId(q.id); // 存入 localStorage
                feedbackMsg.className = 'p-4 rounded-2xl mb-4 font-bold bg-red-50 text-red-700 border border-red-200';
                feedbackMsg.innerHTML = `答錯了。正確答案：${q.options[correctKey]}`;
            }

            if (currentQuestionIndex === currentQuizData.length - 1) {
                document.getElementById('next-btn').innerHTML = '<span>查看練習總結</span>';
            }
        }

        function showSummary() {
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score-text').innerText = `${score} / ${currentQuizData.length}`;
            document.getElementById('final-accuracy-text').innerText = `${Math.round((score/currentQuizData.length)*100)}%`;

            const nextGroupBtn = document.getElementById('next-group-btn');
            if (!isWrongBookMode && currentGroupIndex < groupedQuestions.length - 1) {
                nextGroupBtn.classList.remove('hidden');
                nextGroupBtn.innerText = `下一組 (組別 ${currentGroupIndex + 2})`;
                nextGroupBtn.onclick = () => initQuiz(currentGroupIndex + 1);
            } else {
                nextGroupBtn.classList.add('hidden');
            }

            const summaryDiv = document.getElementById('wrong-questions-summary');
            const wrongList = document.getElementById('wrong-list');
            if (wrongQuestionsInThisRound.length > 0) {
                summaryDiv.classList.remove('hidden');
                wrongList.innerHTML = '';
                wrongQuestionsInThisRound.forEach(id => {
                    const span = document.createElement('span');
                    span.className = 'bg-white px-3 py-1 rounded-full border border-red-200 shadow-sm';
                    span.innerText = `題號 #${id}`;
                    wrongList.appendChild(span);
                });
            } else {
                summaryDiv.classList.add('hidden');
            }
        }

        document.getElementById('next-btn').onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuizData.length) loadQuestion();
            else showSummary();
        };
    </script>
</body>
</html>
