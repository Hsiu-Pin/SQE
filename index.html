<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLK 題目練習系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #1a1a1b; /* 深灰黑色背景 */
            -webkit-tap-highlight-color: transparent;
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
            background-color: #2d2d2e; /* 選項卡片深色背景 */
            border-color: #3f3f40;
        }
        .option-card:hover {
            border-color: #6366f1;
            background-color: #353536;
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .correct {
            background-color: #064e3b !important;
            border-color: #10b981 !important;
            color: #ecfdf5 !important;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }
        .wrong {
            background-color: #7f1d1d !important;
            border-color: #ef4444 !important;
            color: #fef2f2 !important;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .wrong-mode-bg {
            background-color: #1c1010 !important; /* 錯題模式稍微帶紅的深色 */
        }
        /* 自定義滾動條 */
        ::-webkit-scrollbar {
            width: 8px;
        }
        ::-webkit-scrollbar-track {
            background: #1a1a1b;
        }
        ::-webkit-scrollbar-thumb {
            background: #3f3f40;
            border-radius: 10px;
        }
    </style>
</head>
<body id="body-bg" class="min-h-screen flex items-center justify-center p-4">

    <div id="app" class="max-w-2xl w-full bg-[#242425] rounded-3xl shadow-2xl overflow-hidden border border-[#3f3f40]">
        <!-- Header -->
        <div id="header-bar" class="bg-indigo-700 p-6 text-white relative transition-colors duration-500">
            <!-- 恢復進度 Banner -->
            <div id="restore-banner" class="hidden absolute inset-0 bg-slate-900/95 z-30 flex flex-col items-center justify-center p-4 text-center">
                <p class="mb-4 text-sm font-medium">偵測到上次儲存的進度，是否繼續？</p>
                <div class="flex space-x-3">
                    <button onclick="restoreProgress()" class="bg-yellow-400 hover:bg-yellow-500 text-indigo-900 px-4 py-2 rounded-xl font-bold text-xs transition-all">載入進度</button>
                    <button onclick="fullSystemReset()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl font-bold text-xs transition-all">重新開始</button>
                </div>
            </div>

            <div class="flex justify-between items-start mb-4">
                <div class="flex flex-col items-start space-y-2">
                    <button onclick="confirmFullReset()" class="bg-white/10 hover:bg-red-500 text-white text-[10px] py-1 px-2 rounded-md transition-colors flex items-center space-x-1">
                        <svg class="w-3 h-3" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"></path></svg>
                        <span>系統全重置</span>
                    </button>
                    <span id="set-label" class="bg-indigo-500/50 text-xs py-1 px-2 rounded-md uppercase tracking-wider font-bold border border-indigo-400/30">Group 1</span>
                    <h1 class="text-2xl font-bold mt-1">FLK 測驗</h1>
                </div>
                <div class="text-right flex flex-col items-end space-y-2">
                    <div id="timer-display" class="bg-black/30 px-3 py-1.5 rounded-lg flex items-center space-x-2 border border-white/10">
                        <span class="text-[10px] opacity-80">剩餘時間</span>
                        <span id="timer-text" class="text-lg font-mono font-bold text-yellow-400">153:00</span>
                        <button onclick="toggleTimer()" id="timer-control-btn" class="bg-white/10 hover:bg-white/20 px-2 py-1 rounded flex items-center space-x-1 transition-colors">
                            <svg id="timer-icon" class="w-3 h-3" fill="currentColor" viewBox="0 0 20 20"><path d="M10 18a8 8 0 100-16 8 8 0 000 16zM8 7a1 1 0 00-1-1H7a1 1 0 00-1 1v6a1 1 0 001 1h1a1 1 0 001-1V7zM13 7a1 1 0 00-1-1h-1a1 1 0 00-1 1v6a1 1 0 001 1h1a1 1 0 001-1V7z"></path></svg>
                        </button>
                    </div>
                    <div id="score-counter">
                        <span class="text-sm opacity-75">正確率</span>
                        <span class="text-xl font-mono font-bold" id="live-accuracy">0%</span>
                    </div>
                </div>
            </div>
            
            <div class="h-2 bg-black/40 rounded-full overflow-hidden border border-white/5">
                <div id="progress-bar" class="h-full bg-yellow-400 rounded-full transition-all duration-700 ease-out shadow-[0_0_8px_rgba(250,204,21,0.5)]" style="width: 0%"></div>
            </div>
            
            <div class="flex justify-between mt-2 items-center">
                <p id="progress-text" class="text-[10px] opacity-80 uppercase tracking-widest font-medium text-indigo-100">分組載入中...</p>
                <div class="flex space-x-2">
                    <button onclick="saveCurrentProgress()" class="bg-blue-600 hover:bg-blue-500 text-white text-[10px] rounded px-2 py-1 transition-colors flex items-center space-x-1">
                        <span>手動存檔</span>
                    </button>
                    <button id="reset-wrong-btn" onclick="confirmResetWrong()" class="hidden bg-orange-600 hover:bg-orange-500 text-white text-[10px] rounded px-2 py-1 transition-colors">
                        清空錯題本
                    </button>
                    <button onclick="toggleWrongBook()" id="wrong-book-btn" class="bg-red-600 hover:bg-red-500 text-white text-[10px] rounded px-2 py-1 transition-colors">
                        錯題本 (<span id="wrong-count">0</span>)
                    </button>
                    <select id="group-selector" onchange="jumpToGroup(this.value)" class="bg-black/30 text-white text-[10px] border border-white/10 rounded px-2 py-1 outline-none cursor-pointer">
                    </select>
                </div>
            </div>
        </div>

        <!-- Quiz Area -->
        <div id="quiz-container" class="p-6 md:p-10 relative min-h-[400px]">
            <div id="pause-overlay" class="hidden absolute inset-0 bg-[#1a1a1b]/95 z-10 flex flex-col items-center justify-center backdrop-blur-md">
                <h3 class="text-2xl font-black text-white mb-4">測驗暫停中</h3>
                <button onclick="toggleTimer()" class="bg-indigo-600 hover:bg-indigo-500 text-white px-8 py-3 rounded-2xl font-bold shadow-lg transition-all">恢復測驗</button>
            </div>

            <div id="question-box" class="fade-in">
                <div class="flex items-center justify-between mb-4">
                    <span id="question-id-tag" class="text-xs font-bold px-2.5 py-1 rounded-full bg-indigo-900/40 text-indigo-300 border border-indigo-700/50">#題號</span>
                    <span id="mode-tag" class="text-[10px] font-bold text-gray-500 uppercase">一般練習模式</span>
                </div>
                <h2 id="question-text" class="text-lg md:text-xl font-medium text-gray-100 mb-8 leading-relaxed">載入題目中...</h2>
                <div id="options-container" class="space-y-4"></div>
            </div>

            <div id="feedback-area" class="mt-8 hidden">
                <div id="feedback-message" class="p-4 rounded-2xl mb-4 font-medium text-sm text-center"></div>
                <button id="next-btn" class="w-full bg-white hover:bg-gray-200 text-black font-bold py-4 rounded-2xl transition-all flex justify-center items-center space-x-2 shadow-xl">
                    <span>下一題</span>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="p-8 md:p-10 hidden text-center fade-in">
            <h2 class="text-3xl font-extrabold text-white mb-6">練習結束</h2>
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-black/20 p-4 rounded-2xl border border-[#3f3f40]">
                    <span class="block text-gray-400 text-sm">得分</span>
                    <span class="text-2xl font-bold text-indigo-400" id="final-score-text">0/0</span>
                </div>
                <div class="bg-black/20 p-4 rounded-2xl border border-[#3f3f40]">
                    <span class="block text-gray-400 text-sm">正確率</span>
                    <span class="text-2xl font-bold text-indigo-400" id="final-accuracy-text">0%</span>
                </div>
            </div>
            <div class="space-y-3">
                <button id="next-group-btn" class="w-full bg-green-700 hover:bg-green-600 text-white font-bold py-4 rounded-2xl hidden shadow-lg transition-all">下一組</button>
                <button onclick="restartCurrentSession(true)" class="w-full bg-indigo-600 hover:bg-indigo-500 text-white font-bold py-4 rounded-2xl shadow-lg transition-all">本組亂序重做</button>
                <button onclick="exitToNormal()" class="w-full bg-[#3f3f40] hover:bg-[#4f4f50] text-gray-200 font-bold py-4 rounded-2xl transition-all">回到首頁</button>
            </div>
        </div>
    </div>

    <!-- 自定義對話框 -->
    <div id="custom-modal" class="hidden fixed inset-0 z-50 flex items-center justify-center p-4 bg-black/80 backdrop-blur-sm">
        <div class="bg-[#2d2d2e] rounded-3xl p-8 max-w-sm w-full shadow-2xl text-center border border-[#3f3f40]">
            <h3 id="modal-title" class="text-xl font-bold mb-2 text-white">確認操作</h3>
            <p id="modal-desc" class="text-gray-400 mb-6 text-sm"></p>
            <div class="flex space-x-3">
                <button onclick="closeModal()" class="flex-1 bg-[#3f3f40] py-3 rounded-2xl font-bold text-gray-200">取消</button>
                <button id="modal-confirm-btn" class="flex-1 bg-red-700 py-3 rounded-2xl font-bold text-white shadow-lg">確定</button>
            </div>
        </div>
    </div>

    <script>
        // 設定變數
        const TIME_LIMIT_MINUTES = 153;
        const BASE_PER_GROUP = 30;
        const LOCAL_STORAGE_KEY_WRONG = 'law_quiz_wrong_ids_v2';
        const LOCAL_STORAGE_KEY_PROGRESS = 'law_quiz_save_data_v2';

        let allQuestions = [];
        let groupedQuestions = [];
        let currentQuizData = [];
        let currentQuestionIndex = 0;
        let score = 0;
        let answeredTotal = 0;
        let isAnswered = false;
        let isRandomMode = false;
        let isWrongBookMode = false;
        let currentGroupIndex = 0;

        let timeRemaining = TIME_LIMIT_MINUTES * 60;
        let timerInterval = null;
        let isTimerPaused = false;

        window.onload = () => {
            if (window.originalQuizData && window.originalQuizData.length > 0) {
                allQuestions = window.originalQuizData;
                createGroups(); 
                renderGroupSelector();
                updateWrongCountDisplay();
                checkProgress();
            }
        };

        function createGroups() {
            groupedQuestions = [];
            let total = allQuestions.length;
            let tempGroups = [];
            for (let i = 0; i < total; i += BASE_PER_GROUP) {
                tempGroups.push(allQuestions.slice(i, i + BASE_PER_GROUP));
            }
            if (tempGroups.length > 1) {
                let lastIdx = tempGroups.length - 1;
                if (tempGroups[lastIdx].length < BASE_PER_GROUP) {
                    let lastGroup = tempGroups.pop();
                    tempGroups[tempGroups.length - 1] = tempGroups[tempGroups.length - 1].concat(lastGroup);
                }
            }
            groupedQuestions = tempGroups;
        }

        function showModal(title, desc, onConfirm) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-desc').innerText = desc;
            document.getElementById('modal-confirm-btn').onclick = onConfirm;
            document.getElementById('custom-modal').classList.remove('hidden');
        }
        function closeModal() { document.getElementById('custom-modal').classList.add('hidden'); }

        function confirmFullReset() {
            showModal("全系統重置", "將清除所有存檔與錯題本，確定嗎？", () => {
                localStorage.removeItem(LOCAL_STORAGE_KEY_PROGRESS);
                localStorage.removeItem(LOCAL_STORAGE_KEY_WRONG);
                location.reload();
            });
        }

        function confirmResetWrong() {
            showModal("重置錯題本", "將清除所有紀錄的錯題，確定嗎？", () => {
                localStorage.removeItem(LOCAL_STORAGE_KEY_WRONG);
                updateWrongCountDisplay();
                closeModal();
                if (isWrongBookMode) exitToNormal();
            });
        }

        function startTimer() {
            if (timerInterval) clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                if (!isTimerPaused) {
                    timeRemaining--;
                    updateTimerDisplay();
                    if (timeRemaining <= 0) { clearInterval(timerInterval); showSummary(); }
                }
            }, 1000);
        }

        function toggleTimer() {
            isTimerPaused = !isTimerPaused;
            document.getElementById('pause-overlay').classList.toggle('hidden', !isTimerPaused);
        }

        function updateTimerDisplay() {
            const display = document.getElementById('timer-text');
            const m = Math.floor(timeRemaining / 60);
            const s = timeRemaining % 60;
            display.innerText = `${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
        }

        function checkProgress() {
            const saved = localStorage.getItem(LOCAL_STORAGE_KEY_PROGRESS);
            if (saved) { document.getElementById('restore-banner').classList.remove('hidden'); }
            else { initQuiz(0); }
        }

        function restoreProgress() {
            const saved = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_PROGRESS));
            document.getElementById('restore-banner').classList.add('hidden');
            isWrongBookMode = saved.mode === 'wrong';
            currentGroupIndex = saved.groupIndex || 0;
            currentQuestionIndex = saved.questionIndex || 0;
            score = saved.score || 0;
            answeredTotal = saved.answeredTotal || 0;
            timeRemaining = saved.timeRemaining || (TIME_LIMIT_MINUTES * 60);
            
            if (isWrongBookMode) enterWrongBookMode(true);
            else initQuiz(currentGroupIndex, false, true);
        }

        function saveCurrentProgress() {
            const data = {
                mode: isWrongBookMode ? 'wrong' : 'normal',
                groupIndex: currentGroupIndex,
                questionIndex: currentQuestionIndex,
                score: score,
                answeredTotal: answeredTotal,
                timeRemaining: timeRemaining
            };
            localStorage.setItem(LOCAL_STORAGE_KEY_PROGRESS, JSON.stringify(data));
        }

        function renderGroupSelector() {
            const sel = document.getElementById('group-selector');
            sel.innerHTML = '';
            groupedQuestions.forEach((group, i) => {
                const opt = document.createElement('option');
                opt.value = i;
                opt.innerText = `組別 ${i+1} (${group.length} 題)`;
                sel.appendChild(opt);
            });
        }

        function jumpToGroup(idx) { initQuiz(parseInt(idx)); }

        function initQuiz(idx, shouldShuffle = false, isRestoring = false) {
            currentGroupIndex = idx;
            isRandomMode = shouldShuffle;
            currentQuizData = shouldShuffle ? shuffle([...groupedQuestions[idx]]) : [...groupedQuestions[idx]];
            
            document.getElementById('group-selector').value = idx;
            document.getElementById('set-label').innerText = `Group ${idx + 1}`;
            
            if (!isRestoring) {
                currentQuestionIndex = 0; score = 0; answeredTotal = 0;
                timeRemaining = TIME_LIMIT_MINUTES * 60;
            }
            
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            loadQuestion();
            updateProgress();
            startTimer();
        }

        function loadQuestion() {
            if (!currentQuizData[currentQuestionIndex]) return;
            isAnswered = false;
            const q = currentQuizData[currentQuestionIndex];
            const idTag = document.getElementById('question-id-tag');
            
            if (isWrongBookMode) {
                idTag.innerText = `#錯題題號 ${q.id}`;
                idTag.className = 'text-xs font-bold px-2.5 py-1 rounded-full bg-red-900/40 text-red-300 border border-red-700/50';
            } else {
                idTag.innerText = `#題號 ${q.id}`;
                idTag.className = 'text-xs font-bold px-2.5 py-1 rounded-full bg-indigo-900/40 text-indigo-300 border border-indigo-700/50';
            }

            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            
            Object.entries(q.options).forEach(([key, val]) => {
                const btn = document.createElement('button');
                btn.className = 'option-card w-full text-left p-4 rounded-2xl border-2 flex items-start shadow-sm';
                btn.innerHTML = `<span class="font-bold mr-4 text-indigo-400">${key}.</span><span class="text-gray-200">${val}</span>`;
                btn.onclick = () => checkAnswer(key, btn);
                btn.dataset.key = key;
                container.appendChild(btn);
            });
            document.getElementById('feedback-area').classList.add('hidden');
            updateProgress();
        }

        function checkAnswer(key, btn) {
            if (isAnswered) return;
            isAnswered = true;
            answeredTotal++;
            const q = currentQuizData[currentQuestionIndex];
            const correctKey = q.answer;
            
            document.querySelectorAll('.option-card').forEach(b => {
                if (b.dataset.key === correctKey) b.classList.add('correct');
                else if (b.dataset.key === key) b.classList.add('wrong');
            });

            const feedback = document.getElementById('feedback-message');
            if (key === correctKey) {
                score++;
                feedback.className = "p-4 rounded-2xl mb-4 font-medium text-sm text-center bg-green-900/30 text-green-300 border border-green-700/50";
                feedback.innerText = "正確！";
                if (isWrongBookMode) removeFromWrong(q.id);
            } else {
                feedback.className = "p-4 rounded-2xl mb-4 font-medium text-sm text-center bg-red-900/30 text-red-300 border border-red-700/50";
                feedback.innerText = `錯誤，正確答案是 ${correctKey}`;
                saveToWrong(q.id);
            }
            
            document.getElementById('feedback-area').classList.remove('hidden');
        }

        function updateProgress() {
            const perc = (currentQuestionIndex / currentQuizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${perc}%`;
            document.getElementById('progress-text').innerText = `進度: ${currentQuestionIndex + 1} / ${currentQuizData.length}`;
            const acc = answeredTotal === 0 ? 0 : Math.round((score / answeredTotal) * 100);
            document.getElementById('live-accuracy').innerText = `${acc}%`;
        }

        function saveToWrong(id) {
            let ids = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_WRONG) || '[]');
            if (!ids.includes(id)) {
                ids.push(id);
                localStorage.setItem(LOCAL_STORAGE_KEY_WRONG, JSON.stringify(ids));
            }
            updateWrongCountDisplay();
        }
        function removeFromWrong(id) {
            let ids = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_WRONG) || '[]');
            ids = ids.filter(x => x !== id);
            localStorage.setItem(LOCAL_STORAGE_KEY_WRONG, JSON.stringify(ids));
            updateWrongCountDisplay();
        }
        function updateWrongCountDisplay() {
            document.getElementById('wrong-count').innerText = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_WRONG) || '[]').length;
        }

        function enterWrongBookMode(restoring = false) {
            const wrongIds = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_WRONG) || '[]');
            if (wrongIds.length === 0) return;
            
            isWrongBookMode = true;
            currentQuizData = allQuestions.filter(q => wrongIds.includes(q.id));
            
            document.getElementById('header-bar').className = 'bg-red-800 p-6 text-white relative transition-colors';
            document.getElementById('body-bg').classList.add('wrong-mode-bg');
            document.getElementById('reset-wrong-btn').classList.remove('hidden');
            document.getElementById('mode-tag').innerText = "錯題複習模式";
            document.getElementById('mode-tag').classList.replace('text-gray-500', 'text-red-400');
            document.getElementById('wrong-book-btn').innerText = "退出模式";
            
            if (!restoring) { currentQuestionIndex = 0; score = 0; answeredTotal = 0; }
            loadQuestion();
            startTimer();
        }

        function exitToNormal() {
            isWrongBookMode = false;
            document.getElementById('header-bar').className = 'bg-indigo-700 p-6 text-white relative transition-colors';
            document.getElementById('body-bg').classList.remove('wrong-mode-bg');
            document.getElementById('reset-wrong-btn').classList.add('hidden');
            document.getElementById('mode-tag').innerText = "一般練習模式";
            document.getElementById('mode-tag').className = "text-[10px] font-bold text-gray-500 uppercase";
            updateWrongCountDisplay();
            initQuiz(currentGroupIndex);
        }

        function toggleWrongBook() { isWrongBookMode ? exitToNormal() : enterWrongBookMode(); }

        function showSummary() {
            clearInterval(timerInterval);
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score-text').innerText = `${score} / ${currentQuizData.length}`;
            document.getElementById('final-accuracy-text').innerText = `${Math.round((score/currentQuizData.length)*100)}%`;
            
            const nxt = document.getElementById('next-group-btn');
            if (!isWrongBookMode && currentGroupIndex < groupedQuestions.length - 1) {
                nxt.classList.remove('hidden');
                nxt.onclick = () => initQuiz(currentGroupIndex + 1);
            } else { nxt.classList.add('hidden'); }
        }

        function restartCurrentSession(shuffleNeeded = false) {
            initQuiz(currentGroupIndex, shuffleNeeded);
        }

        function shuffle(arr) {
            for (let i = arr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [arr[i], arr[j]] = [arr[j], arr[i]];
            }
            return arr;
        }

        document.getElementById('next-btn').onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuizData.length) loadQuestion();
            else showSummary();
        };

        // ==========================================================
        // 題庫資料區：請在此處替換或增加題目
        // ==========================================================
        window.originalQuizData = [
  {
    "id": 1,
    "question": "You act on behalf of a married couple in a claim against a building contractor (acting as a sole trader) for breach of contract. The claim is for the cost of undertaking remedial works to the couple’s property following completion of the works. The claim has been defended on the basis that the items of work to which the claim relates are not, in fact, defective. You have received the defendant’s witness statements this morning and observe that one statement is from a friend of the defendant. The friend is a retired building surveyor and provides his comments on the alleged defects based on the information given to him by the defendant, following which he concludes that the quality of the build is first rate. Which of the following best represents the advice you should give your client?",
    "options": {
      "A": "The statement is inadmissible as opinion evidence",
      "B": "The statement may be admissible if your clients serve a hearsay notice at the time of exchange of statements",
      "C": "The statement is inadmissible as expert evidence in respect of which no permission has been granted",
      "D": "The statement may be admissible as the witness has expertise which is relevant to the issues on which he has given evidence",
      "E": "The statement is inadmissible as the witness is not qualified to give evidence on the issues in dispute between the parties"
    },
    "answer": "D"
  },
