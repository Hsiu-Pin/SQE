<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FLK題目練習系統 (進度存檔版)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: #f3f4f6;
            -webkit-tap-highlight-color: transparent;
        }
        .option-card {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .option-card:active {
            transform: scale(0.98);
        }
        .correct {
            background-color: #d1fae5 !important;
            border-color: #10b981 !important;
            color: #065f46 !important;
            box-shadow: 0 4px 6px -1px rgba(16, 185, 129, 0.2);
        }
        .wrong {
            background-color: #fee2e2 !important;
            border-color: #ef4444 !important;
            color: #991b1b !important;
            box-shadow: 0 4px 6px -1px rgba(239, 68, 68, 0.2);
        }
        .fade-in {
            animation: fadeIn 0.4s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center p-4 bg-slate-50">

    <div id="app" class="max-w-2xl w-full bg-white rounded-3xl shadow-2xl overflow-hidden border border-gray-100">
        <!-- Header -->
        <div class="bg-indigo-600 p-6 text-white relative">
            <!-- 進度回復提示彈窗 -->
            <div id="restore-banner" class="hidden absolute inset-0 bg-indigo-900/95 z-20 flex flex-col items-center justify-center p-4 text-center">
                <p class="mb-4 text-sm font-medium">偵測到上次未完成的進度，是否繼續？</p>
                <div class="flex space-x-3">
                    <button onclick="restoreProgress()" class="bg-yellow-400 hover:bg-yellow-500 text-indigo-900 px-4 py-2 rounded-xl font-bold text-xs transition-all">載入進度</button>
                    <button onclick="clearProgressData()" class="bg-white/10 hover:bg-white/20 text-white px-4 py-2 rounded-xl font-bold text-xs transition-all">重新開始</button>
                </div>
            </div>

            <div class="flex justify-between items-end mb-4">
                <div>
                    <span id="set-label" class="bg-indigo-500 text-xs py-1 px-2 rounded-md uppercase tracking-wider font-bold">Group 1</span>
                    <h1 class="text-2xl font-bold mt-1">FLK測驗</h1>
                </div>
                <div id="score-counter" class="text-right">
                    <span class="text-sm opacity-75">正確率</span>
                    <div class="text-xl font-mono font-bold" id="live-accuracy">0%</div>
                </div>
            </div>
            <div class="h-2 bg-indigo-800/50 rounded-full overflow-hidden">
                <div id="progress-bar" class="h-full bg-yellow-400 rounded-full transition-all duration-700 ease-out" style="width: 0%"></div>
            </div>
            <div class="flex justify-between mt-2 items-center">
                <p id="progress-text" class="text-[10px] opacity-80 uppercase tracking-widest font-medium">準備中...</p>
                <div class="flex space-x-2">
                    <button onclick="toggleWrongBook()" id="wrong-book-btn" class="bg-red-500 hover:bg-red-600 text-white text-[10px] rounded px-2 py-1 transition-colors">
                        錯題本 (<span id="wrong-count">0</span>)
                    </button>
                    <select id="group-selector" onchange="jumpToGroup(this.value)" class="bg-indigo-700 text-white text-[10px] border-none rounded px-2 py-1 outline-none cursor-pointer">
                        <!-- 組別選單 -->
                    </select>
                </div>
            </div>
        </div>

        <!-- Quiz Area -->
        <div id="quiz-container" class="p-6 md:p-10">
            <div id="question-box" class="fade-in">
                <div class="flex items-center justify-between mb-4">
                    <span id="question-id-tag" class="bg-indigo-100 text-indigo-700 text-xs font-bold px-2.5 py-1 rounded-full">Question</span>
                    <div class="flex items-center space-x-2">
                        <span id="save-status" class="text-[9px] text-green-500 opacity-0 transition-opacity">已自動存檔</span>
                        <span id="mode-tag" class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">一般練習模式</span>
                    </div>
                </div>
                <h2 id="question-text" class="text-lg md:text-xl font-medium text-gray-800 mb-8 leading-relaxed">載入中...</h2>
                
                <div id="options-container" class="space-y-4"></div>
            </div>

            <!-- Feedback -->
            <div id="feedback-area" class="mt-8 hidden">
                <div id="feedback-message" class="p-4 rounded-2xl mb-4 font-medium flex items-center space-x-3 text-sm"></div>
                <button id="next-btn" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-4 rounded-2xl shadow-xl transition-all active:scale-95 flex justify-center items-center space-x-2">
                    <span>下一題</span>
                    <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 7l5 5m0 0l-5 5m5-5H6"></path></svg>
                </button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="p-8 md:p-10 hidden text-center fade-in">
            <div class="w-20 h-20 bg-indigo-100 rounded-full flex items-center justify-center mx-auto mb-6">
                <svg class="w-10 h-10 text-indigo-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"></path>
                </svg>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900 mb-2">練習結束</h2>
            <p class="text-gray-500 mb-6" id="result-subtitle">太棒了！您已經完成此階段練習。</p>
            
            <div class="grid grid-cols-2 gap-4 mb-6">
                <div class="bg-slate-50 p-4 rounded-2xl border border-gray-100">
                    <span class="block text-gray-400 text-sm mb-1">得分</span>
                    <span class="text-2xl font-bold text-indigo-600" id="final-score-text">0/0</span>
                </div>
                <div class="bg-slate-50 p-4 rounded-2xl border border-gray-100">
                    <span class="block text-gray-400 text-sm mb-1">正確率</span>
                    <span class="text-2xl font-bold text-indigo-600" id="final-accuracy-text">0%</span>
                </div>
            </div>

            <div id="wrong-questions-summary" class="text-left mb-8 bg-red-50 p-4 rounded-2xl border border-red-100 hidden">
                <h3 class="text-red-800 font-bold mb-2 flex items-center text-sm">本輪答錯題號</h3>
                <div id="wrong-list" class="flex flex-wrap gap-2 text-sm text-red-600 font-medium"></div>
            </div>

            <div class="space-y-3">
                <button id="next-group-btn" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95 hidden">
                    進入下一組
                </button>
                <button onclick="restartCurrentSession(true)" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl shadow-lg transition-all active:scale-95">
                    本輪亂序重做
                </button>
                <button onclick="exitToNormal()" class="w-full bg-gray-100 hover:bg-gray-200 text-gray-700 font-bold py-4 rounded-2xl transition-all active:scale-95">
                    回到第一組
                </button>
            </div>
        </div>
    </div>

    <script>
        const QUESTIONS_PER_GROUP = 25;
        const LOCAL_STORAGE_KEY_WRONG = 'law_quiz_wrong_ids';
        const LOCAL_STORAGE_KEY_PROGRESS = 'law_quiz_save_data';

        let allQuestions = [];
        let groupedQuestions = [];
        let currentQuizData = []; 
        let currentQuestionIndex = 0;
        let score = 0;
        let answeredTotal = 0;
        let isAnswered = false;
        let isRandomMode = false;
        let isWrongBookMode = false;
        let currentGroupIndex = 0;
        let wrongQuestionsInThisRound = [];

        window.onload = () => {
            if (window.originalQuizData && window.originalQuizData.length > 0) {
                allQuestions = window.originalQuizData;
                splitIntoGroups();
                renderGroupSelector();
                updateWrongCountDisplay();
                checkProgress();
            } else {
                document.getElementById('question-text').innerText = "請在程式碼最後方的 array 中匯入題庫資料。";
            }
        };

        // --- 存檔與回復邏輯 ---
        function checkProgress() {
            const savedData = localStorage.getItem(LOCAL_STORAGE_KEY_PROGRESS);
            if (savedData) {
                document.getElementById('restore-banner').classList.remove('hidden');
            } else {
                initQuiz(0);
            }
        }

        function restoreProgress() {
            const savedData = JSON.parse(localStorage.getItem(LOCAL_STORAGE_KEY_PROGRESS));
            document.getElementById('restore-banner').classList.add('hidden');
            
            isWrongBookMode = savedData.mode === 'wrong';
            currentGroupIndex = savedData.groupIndex || 0;
            currentQuestionIndex = savedData.questionIndex || 0;
            score = savedData.score || 0;
            answeredTotal = savedData.answeredTotal || 0;

            if (isWrongBookMode) {
                enterWrongBookMode(true);
            } else {
                initQuiz(currentGroupIndex, false, true);
            }
        }

        function saveCurrentProgress() {
            if (currentQuestionIndex >= currentQuizData.length) {
                localStorage.removeItem(LOCAL_STORAGE_KEY_PROGRESS);
                return;
            }
            const saveData = {
                mode: isWrongBookMode ? 'wrong' : 'normal',
                groupIndex: currentGroupIndex,
                questionIndex: currentQuestionIndex,
                score: score,
                answeredTotal: answeredTotal,
                timestamp: new Date().getTime()
            };
            localStorage.setItem(LOCAL_STORAGE_KEY_PROGRESS, JSON.stringify(saveData));
            const status = document.getElementById('save-status');
            status.style.opacity = '1';
            setTimeout(() => { status.style.opacity = '0'; }, 1200);
        }

        function clearProgressData() {
            localStorage.removeItem(LOCAL_STORAGE_KEY_PROGRESS);
            document.getElementById('restore-banner').classList.add('hidden');
            initQuiz(0);
        }

        // --- 核心測驗邏輯 ---
        function splitIntoGroups() {
            groupedQuestions = [];
            for (let i = 0; i < allQuestions.length; i += QUESTIONS_PER_GROUP) {
                groupedQuestions.push(allQuestions.slice(i, i + QUESTIONS_PER_GROUP));
            }
        }

        function renderGroupSelector() {
            const selector = document.getElementById('group-selector');
            selector.innerHTML = '';
            groupedQuestions.forEach((group, index) => {
                const option = document.createElement('option');
                option.value = index;
                const start = index * QUESTIONS_PER_GROUP + 1;
                const end = Math.min((index + 1) * QUESTIONS_PER_GROUP, allQuestions.length);
                option.innerText = `組別 ${index + 1} (${start}-${end})`;
                selector.appendChild(option);
            });
        }

        function jumpToGroup(index) {
            localStorage.removeItem(LOCAL_STORAGE_KEY_PROGRESS);
            initQuiz(parseInt(index));
        }

        function initQuiz(groupIndex, shouldShuffle = false, isRestoring = false) {
            currentGroupIndex = groupIndex;
            isRandomMode = shouldShuffle;
            currentQuizData = shouldShuffle ? shuffle([...groupedQuestions[groupIndex]]) : [...groupedQuestions[groupIndex]];
            document.getElementById('group-selector').value = groupIndex;
            document.getElementById('set-label').innerText = `Group ${groupIndex + 1}`;
            if (!isRestoring) resetSessionStats();
            else {
                document.getElementById('quiz-container').classList.remove('hidden');
                document.getElementById('result-screen').classList.add('hidden');
            }
            loadQuestion();
            updateProgress();
        }

        function resetSessionStats() {
            currentQuestionIndex = 0;
            score = 0;
            answeredTotal = 0;
            isAnswered = false;
            wrongQuestionsInThisRound = [];
            document.getElementById('quiz-container').classList.remove('hidden');
            document.getElementById('result-screen').classList.add('hidden');
            document.getElementById('next-btn').innerHTML = '<span>下一題</span>';
            saveCurrentProgress();
        }

        function shuffle(array) {
            const newArr = [...array];
            for (let i = newArr.length - 1; i > 0; i--) {
                const j = Math.floor(Math.random() * (i + 1));
                [newArr[i], newArr[j]] = [newArr[j], newArr[i]];
            }
            return newArr;
        }

        function updateProgress() {
            const progress = (currentQuestionIndex / currentQuizData.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;
            document.getElementById('progress-text').innerText = `進度: ${currentQuestionIndex + 1} / ${currentQuizData.length}`;
            const accuracy = answeredTotal === 0 ? 0 : Math.round((score / answeredTotal) * 100);
            document.getElementById('live-accuracy').innerText = `${accuracy}%`;
        }

        function loadQuestion() {
            isAnswered = false;
            const q = currentQuizData[currentQuestionIndex];
            document.getElementById('question-id-tag').innerText = `題號 #${q.id}`;
            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';
            document.getElementById('feedback-area').classList.add('hidden');
            let optionEntries = Object.entries(q.options);
            if (isRandomMode) optionEntries = shuffle(optionEntries);
            const labelChars = ['A', 'B', 'C', 'D', 'E'];
            optionEntries.forEach((entry, index) => {
                const [key, val] = entry;
                const btn = document.createElement('button');
                btn.className = 'option-card w-full text-left p-4 rounded-2xl border-2 border-gray-100 bg-white hover:border-indigo-200 hover:bg-indigo-50 transition-all flex items-start group';
                btn.innerHTML = `
                    <span class="flex-shrink-0 w-8 h-8 rounded-lg bg-gray-100 group-hover:bg-indigo-600 group-hover:text-white text-gray-500 flex items-center justify-center font-bold text-sm mr-4">${labelChars[index]}</span>
                    <span class="text-gray-700 pt-1 text-sm md:text-base">${val}</span>
                `;
                btn.onclick = () => checkAnswer(key, btn);
                btn.dataset.key = key;
                container.appendChild(btn);
            });
            updateProgress();
        }

        function checkAnswer(selectedKey, clickedBtn) {
            if (isAnswered) return;
            isAnswered = true;
            answeredTotal++;
            const q = currentQuizData[currentQuestionIndex];
            const correctKey = q.answer;
            const buttons = document.querySelectorAll('.option-card');
            buttons.forEach(b => {
                if (b.dataset.key === correctKey) b.classList.add('correct');
                else if (b.dataset.key === selectedKey) b.classList.add('wrong');
                b.style.cursor = 'default';
            });
            const feedbackMsg = document.getElementById('feedback-message');
            document.getElementById('feedback-area').classList.remove('hidden');
            if (selectedKey === correctKey) {
                score++;
                feedbackMsg.className = 'p-4 rounded-2xl mb-4 font-bold bg-green-50 text-green-700 border border-green-200';
                feedbackMsg.innerHTML = "正確解答！";
                if (isWrongBookMode) removeWrongId(q.id);
            } else {
                wrongQuestionsInThisRound.push(q.id);
                saveWrongId(q.id); 
                feedbackMsg.className = 'p-4 rounded-2xl mb-4 font-bold bg-red-50 text-red-700 border border-red-200';
                feedbackMsg.innerHTML = `答錯了。正確答案：${q.options[correctKey]}`;
            }
            if (currentQuestionIndex === currentQuizData.length - 1) {
                document.getElementById('next-btn').innerHTML = '<span>查看練習總結</span>';
            }
            saveCurrentProgress();
        }

        // --- 錯題本與輔助功能 ---
        function getSavedWrongIds() {
            const saved = localStorage.getItem(LOCAL_STORAGE_KEY_WRONG);
            return saved ? JSON.parse(saved) : [];
        }
        function saveWrongId(id) {
            let ids = getSavedWrongIds();
            if (!ids.includes(id)) { ids.push(id); localStorage.setItem(LOCAL_STORAGE_KEY_WRONG, JSON.stringify(ids)); }
            updateWrongCountDisplay();
        }
        function removeWrongId(id) {
            let ids = getSavedWrongIds();
            ids = ids.filter(item => item !== id);
            localStorage.setItem(LOCAL_STORAGE_KEY_WRONG, JSON.stringify(ids));
            updateWrongCountDisplay();
        }
        function updateWrongCountDisplay() {
            document.getElementById('wrong-count').innerText = getSavedWrongIds().length;
        }

        function toggleWrongBook() {
            if (isWrongBookMode) exitToNormal();
            else {
                if (getSavedWrongIds().length === 0) { alert("目前沒有錯題紀錄！"); return; }
                enterWrongBookMode();
            }
        }
        function enterWrongBookMode(isRestoring = false) {
            isWrongBookMode = true;
            const wrongIds = getSavedWrongIds();
            currentQuizData = allQuestions.filter(q => wrongIds.includes(q.id));
            document.getElementById('mode-tag').innerText = "錯題複習模式";
            document.getElementById('mode-tag').classList.replace('text-gray-400', 'text-red-500');
            document.getElementById('wrong-book-btn').innerText = "退出";
            document.getElementById('group-selector').style.display = 'none';
            document.getElementById('set-label').innerText = "Wrong Book";
            if (!isRestoring) resetSessionStats();
            else { document.getElementById('quiz-container').classList.remove('hidden'); document.getElementById('result-screen').classList.add('hidden'); }
            loadQuestion();
            updateProgress();
        }
        function exitToNormal() {
            isWrongBookMode = false;
            localStorage.removeItem(LOCAL_STORAGE_KEY_PROGRESS);
            document.getElementById('mode-tag').innerText = "一般練習模式";
            document.getElementById('mode-tag').classList.replace('text-red-500', 'text-gray-400');
            document.getElementById('wrong-book-btn').innerHTML = `錯題本 (<span id="wrong-count">${getSavedWrongIds().length}</span>)`;
            document.getElementById('group-selector').style.display = 'inline-block';
            initQuiz(0);
        }

        function showSummary() {
            localStorage.removeItem(LOCAL_STORAGE_KEY_PROGRESS);
            document.getElementById('quiz-container').classList.add('hidden');
            document.getElementById('result-screen').classList.remove('hidden');
            document.getElementById('final-score-text').innerText = `${score} / ${currentQuizData.length}`;
            document.getElementById('final-accuracy-text').innerText = `${Math.round((score/currentQuizData.length)*100)}%`;
            const nextGroupBtn = document.getElementById('next-group-btn');
            if (!isWrongBookMode && currentGroupIndex < groupedQuestions.length - 1) {
                nextGroupBtn.classList.remove('hidden');
                nextGroupBtn.onclick = () => initQuiz(currentGroupIndex + 1);
            } else nextGroupBtn.classList.add('hidden');
            const summaryDiv = document.getElementById('wrong-questions-summary');
            const wrongList = document.getElementById('wrong-list');
            if (wrongQuestionsInThisRound.length > 0) {
                summaryDiv.classList.remove('hidden');
                wrongList.innerHTML = '';
                wrongQuestionsInThisRound.forEach(id => {
                    const span = document.createElement('span');
                    span.className = 'bg-white px-3 py-1 rounded-full border border-red-200 shadow-sm';
                    span.innerText = `題號 #${id}`;
                    wrongList.appendChild(span);
                });
            } else summaryDiv.classList.add('hidden');
        }

        function restartCurrentSession(shouldShuffle = false) {
            isRandomMode = shouldShuffle;
            currentQuizData = shouldShuffle ? shuffle([...currentQuizData]) : [...currentQuizData];
            resetSessionStats();
            loadQuestion();
            updateProgress();
        }

        document.getElementById('next-btn').onclick = () => {
            currentQuestionIndex++;
            if (currentQuestionIndex < currentQuizData.length) { loadQuestion(); saveCurrentProgress(); }
            else showSummary();
        };

        // ==========================================================
        // 題庫資料區：請在此處替換或增加題目
        // ==========================================================
        window.originalQuizData = [
  {
    "id": 1,
    "question": "You act on behalf of a married couple in a claim against a building contractor (acting as a sole trader) for breach of contract. The claim is for the cost of undertaking remedial works to the couple’s property following completion of the works. The claim has been defended on the basis that the items of work to which the claim relates are not, in fact, defective. You have received the defendant’s witness statements this morning and observe that one statement is from a friend of the defendant. The friend is a retired building surveyor and provides his comments on the alleged defects based on the information given to him by the defendant, following which he concludes that the quality of the build is first rate. Which of the following best represents the advice you should give your client?",
    "options": {
      "A": "The statement is inadmissible as opinion evidence",
      "B": "The statement may be admissible if your clients serve a hearsay notice at the time of exchange of statements",
      "C": "The statement is inadmissible as expert evidence in respect of which no permission has been granted",
      "D": "The statement may be admissible as the witness has expertise which is relevant to the issues on which he has given evidence",
      "E": "The statement is inadmissible as the witness is not qualified to give evidence on the issues in dispute between the parties"
    },
    "answer": "D"
  },
  {
    "id": 2,
    "question": "A senior journalist in a leading business website is conducting an investigation into the interests and ownership of shares of a private limited company. She approaches the company and asks for a copy of its register of members so she can carry out the investigation. The managing director of the company does not want to disclose this information and asks for your advice. Does the journalist have the right to receive a copy of the register of members?",
    "options": {
      "A": "No, unless she is a shareholder",
      "B": "No, because she does not meet the sufficient interest test",
      "C": "Yes, and the company must comply with the request or provide a written explanation to the journalist for its refusal to do so within five working days",
      "D": "No, but she has the right to inspect it",
      "E": "Yes, and the company must either comply with the request or apply to the court to refuse the request"
    },
    "answer": "E"
  },
  {
    "id": 3,
    "question": "A group of pro-life campaigners are marching on, and protesting outside, a women’s health clinic. They have given adequate notice of their intention to process to the police. When the march begins, a police constable assigned to observe the procession receives word that a pro-choice group, which opposed the pro-life campaigners, is waiting ahead to ambush the protest. The police believe the march may cause significant traffic issues in the area. Can the police constable instruct the organisers to change their route?",
    "options": {
      "A": "No, because he is not a high rank officer",
      "B": "Yes, if he serves the instruction upon the organisers in writing",
      "C": "No, because the requisite notice of the procession has been properly served and the procession has already started",
      "D": "Yes, if he reasonably believes the procession may result in serious disruption to the life of the community",
      "E": "No, because the police cannot impose conditions on public processions"
    },
    "answer": "D"
  },
  {
    "id": 4,
    "question": "A warehouse employee was required to climb a tall ladder as part of her job. Outside of the workplace, the employee enjoys taking extreme risks including rock climbing. She therefore had no concerns when she climbed the job involved climbing ladders. The employee often offers to climb the ladder on behalf of her fellow colleagues who are scared of heights. While climbing the ladder one day, a manager in the warehouse ran past knocking the ladder to the side causing the employee to fall off and resulting in serious personal injury. The ladder was found to be in good working condition after the incident. The employee now seeks to recover for her injuries from her employer. Which of the following best describes the liability of the employer, if any?",
    "options": {
      "A": "The employer is unlikely to be liable as the employee enjoys extreme risk taking",
      "B": "The employer is unlikely to be liable as the employee willingly accepted the risk",
      "C": "The employer may be liable under health and safety laws only",
      "D": "The employer may be liable in negligence only",
      "E": "The employer may be liable under health and safety laws and in negligence"
    },
    "answer": "E"
  },
  {
    "id": 5,
    "question": "The High Court has granted an appeal involving a point of law of general importance directly to the Supreme Court via the ‘leapfrogging’ procedure and an application for judicial review. Justices of the Supreme Court have been asked to establish the meaning of a ‘working day’ in the (fictional) EU Regulation on Daytime Working. The EU Regulation has been saved as retained EU law. Opposing counsel make their respective representations. When making their deliberations, the Justices realise that their decision would lead to a departure from retained EU case law. Which option best describes the test which the Supreme Court (the ‘Court’) must apply in deciding whether it can depart from retained EU case law?",
    "options": {
      "A": "The Court cannot change settled law in the course of adjudication, and the legislation is clear that the Court cannot change the law on the basis of any test set out in statute",
